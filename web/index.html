<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoNav — Campus Navigation System</title>
<meta name="description" content="Interactive geospatial routing and navigation system with Dijkstra and A* pathfinding algorithms">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   CSS — Dark Mode, Glassmorphism, Premium Design
   ═══════════════════════════════════════════════════════════ */

*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}

:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-glass: rgba(17, 24, 39, 0.75);
  --border-glass: rgba(99, 102, 241, 0.2);
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-dim: #64748b;
  --accent: #6366f1;
  --accent-glow: rgba(99, 102, 241, 0.4);
  --accent-2: #8b5cf6;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --node-color: #6366f1;
  --node-hover: #818cf8;
  --edge-color: rgba(148, 163, 184, 0.3);
  --route-color: #10b981;
  --explored-color: rgba(251, 191, 36, 0.3);
  --radius: 12px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── Sidebar ───────────────────────────────────────────── */

#sidebar {
  width: 340px;
  min-width: 340px;
  height: 100vh;
  background: var(--bg-glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-right: 1px solid var(--border-glass);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  z-index: 10;
}

#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-track { background: transparent; }
#sidebar::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 4px; }

.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border-glass);
}

.sidebar-header h1 {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.5px;
}

.sidebar-header p {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 4px;
}

.panel {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-glass);
}

.panel-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 12px;
}

/* ── Form Controls ─────────────────────────────────────── */

label {
  display: block;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 4px;
  font-weight: 500;
}

select, input[type="text"], input[type="number"] {
  width: 100%;
  padding: 8px 12px;
  background: rgba(15, 23, 42, 0.8);
  border: 1px solid var(--border-glass);
  border-radius: 8px;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color var(--transition);
  margin-bottom: 10px;
}

select:focus, input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

select option { background: var(--bg-secondary); }

.form-row {
  display: flex;
  gap: 8px;
}

.form-row > div { flex: 1; }

/* ── Buttons ───────────────────────────────────────────── */

.btn {
  width: 100%;
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: white;
  box-shadow: 0 4px 15px var(--accent-glow);
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px var(--accent-glow);
}

.btn-secondary {
  background: rgba(99, 102, 241, 0.15);
  color: var(--accent);
  border: 1px solid var(--border-glass);
}

.btn-secondary:hover {
  background: rgba(99, 102, 241, 0.25);
}

.btn-success {
  background: linear-gradient(135deg, #059669, #10b981);
  color: white;
  box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
}

.btn-success:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
}

.btn-sm {
  padding: 7px 12px;
  font-size: 12px;
}

.btn-group {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}

.btn-group .btn { flex: 1; }

/* ── Strategy Toggle ───────────────────────────────────── */

.strategy-toggle {
  display: flex;
  background: rgba(15, 23, 42, 0.8);
  border-radius: 8px;
  padding: 3px;
  border: 1px solid var(--border-glass);
}

.strategy-btn {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
}

.strategy-btn.active {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: white;
  box-shadow: 0 2px 8px var(--accent-glow);
}

/* ── Route Result Card ─────────────────────────────────── */

#route-result {
  display: none;
  margin-top: 12px;
  padding: 14px;
  background: rgba(16, 185, 129, 0.08);
  border: 1px solid rgba(16, 185, 129, 0.2);
  border-radius: var(--radius);
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

#route-result .route-path {
  font-size: 13px;
  font-weight: 600;
  color: var(--success);
  margin-bottom: 8px;
  line-height: 1.5;
}

#route-result .route-stats {
  display: flex;
  gap: 16px;
}

.route-stat {
  font-size: 12px;
  color: var(--text-secondary);
}

.route-stat span {
  font-weight: 700;
  color: var(--text-primary);
  font-size: 16px;
  display: block;
}

/* ── Info Bar ──────────────────────────────────────────── */

#info-bar {
  padding: 10px 20px;
  background: rgba(15, 23, 42, 0.5);
  border-top: 1px solid var(--border-glass);
  font-size: 11px;
  color: var(--text-dim);
  margin-top: auto;
}

#info-bar .stat {
  display: flex;
  justify-content: space-between;
  margin-bottom: 2px;
}

#info-bar .stat-value {
  color: var(--text-secondary);
  font-weight: 600;
}

/* ── Canvas Area ───────────────────────────────────────── */

#canvas-container {
  flex: 1;
  position: relative;
  background:
    radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.04) 0%, transparent 50%),
    var(--bg-primary);
  overflow: hidden;
}

canvas {
  display: block;
  cursor: crosshair;
}

/* ── Tooltip ───────────────────────────────────────────── */

#tooltip {
  position: absolute;
  pointer-events: none;
  background: var(--bg-glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border-glass);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text-primary);
  display: none;
  z-index: 100;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  white-space: nowrap;
}

#tooltip .tt-name { font-weight: 600; font-size: 13px; }
#tooltip .tt-id { color: var(--text-dim); font-size: 11px; }
#tooltip .tt-coords { color: var(--text-secondary); margin-top: 2px; }

/* ── Notification ──────────────────────────────────────── */

#notification {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  z-index: 1000;
  opacity: 0;
  transform: translateY(-10px);
  transition: all 0.3s ease;
  pointer-events: none;
}

#notification.show {
  opacity: 1;
  transform: translateY(0);
}

#notification.success {
  background: rgba(16, 185, 129, 0.15);
  border: 1px solid rgba(16, 185, 129, 0.3);
  color: var(--success);
}

#notification.error {
  background: rgba(239, 68, 68, 0.15);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: var(--danger);
}

/* ── Collapsible Sections ──────────────────────────────── */

.collapsible-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  user-select: none;
}

.collapsible-header .chevron {
  transition: transform var(--transition);
  font-size: 10px;
  color: var(--text-dim);
}

.collapsible-header.collapsed .chevron {
  transform: rotate(-90deg);
}

.collapsible-body {
  overflow: hidden;
  transition: max-height 0.3s ease, opacity 0.3s ease;
  max-height: 500px;
  opacity: 1;
}

.collapsible-body.collapsed {
  max-height: 0;
  opacity: 0;
}

/* ── Legend ─────────────────────────────────────────────── */

.legend {
  position: absolute;
  bottom: 16px;
  right: 16px;
  background: var(--bg-glass);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border-glass);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 11px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
  color: var(--text-secondary);
}

.legend-item:last-child { margin-bottom: 0; }

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.legend-line {
  width: 18px;
  height: 3px;
  border-radius: 2px;
  flex-shrink: 0;
}

<!-- ═══════════════════════════════════════════════════════
     JAVASCRIPT
     ═══════════════════════════════════════════════════════ -->

<script>
// ══════════════════════════════════════════════════════════
//  DATA STRUCTURES  (mirrors Java classes)
// ══════════════════════════════════════════════════════════

class GeoNode {
  constructor(id, name, lat, lon) {
    this.id = id;
    this.name = name;
    this.lat = lat;
    this.lon = lon;
    // canvas position (computed later)
    this.x = 0;
    this.y = 0;
  }
}

class Edge {
  constructor(src, dest, distance, speedLimit) {
    this.src = src;
    this.dest = dest;
    this.distance = distance;
    this.speedLimit = speedLimit;
  }
  get travelTime() { return this.distance / this.speedLimit; }
}

class Graph {
  constructor() {
    this.nodes = new Map();      // id -> GeoNode
    this.adjacency = new Map();  // id -> Edge[]
  }

  addNode(node) {
    this.nodes.set(node.id, node);
    if (!this.adjacency.has(node.id)) this.adjacency.set(node.id, []);
  }

  addEdge(src, dest, distance, speedLimit) {
    this.adjacency.get(src.id).push(new Edge(src, dest, distance, speedLimit));
    this.adjacency.get(dest.id).push(new Edge(dest, src, distance, speedLimit));
  }

  getNeighbors(nodeId) { return this.adjacency.get(nodeId) || []; }
  getNode(id) { return this.nodes.get(id); }
  getAllNodes() { return Array.from(this.nodes.values()); }
  get nodeCount() { return this.nodes.size; }
  get edgeCount() {
    let t = 0;
    for (const edges of this.adjacency.values()) t += edges.length;
    return t / 2;
  }
}

// ══════════════════════════════════════════════════════════
//  QUADTREE
// ══════════════════════════════════════════════════════════

class QuadTree {
  constructor(minLat, maxLat, minLon, maxLon, capacity = 4) {
    this.minLat = minLat; this.maxLat = maxLat;
    this.minLon = minLon; this.maxLon = maxLon;
    this.capacity = capacity;
    this.points = [];
    this.divided = false;
    this.nw = this.ne = this.sw = this.se = null;
  }

  contains(lat, lon) {
    return lat >= this.minLat && lat <= this.maxLat &&
           lon >= this.minLon && lon <= this.maxLon;
  }

  insert(node) {
    if (!this.contains(node.lat, node.lon)) return false;
    if (this.points.length < this.capacity && !this.divided) {
      this.points.push(node);
      return true;
    }
    if (!this.divided) this.subdivide();
    return this.nw.insert(node) || this.ne.insert(node) ||
           this.sw.insert(node) || this.se.insert(node);
  }

  subdivide() {
    const mLat = (this.minLat + this.maxLat) / 2;
    const mLon = (this.minLon + this.maxLon) / 2;
    this.nw = new QuadTree(mLat, this.maxLat, this.minLon, mLon, this.capacity);
    this.ne = new QuadTree(mLat, this.maxLat, mLon, this.maxLon, this.capacity);
    this.sw = new QuadTree(this.minLat, mLat, this.minLon, mLon, this.capacity);
    this.se = new QuadTree(this.minLat, mLat, mLon, this.maxLon, this.capacity);
    for (const p of this.points) {
      this.nw.insert(p) || this.ne.insert(p) || this.sw.insert(p) || this.se.insert(p);
    }
    this.points = [];
    this.divided = true;
  }

  findNearest(lat, lon) {
    const result = { bestNode: null, bestDist: Infinity };
    this._findNearest(lat, lon, result);
    return result.bestNode;
  }

  _findNearest(lat, lon, result) {
    const closeLat = Math.max(this.minLat, Math.min(lat, this.maxLat));
    const closeLon = Math.max(this.minLon, Math.min(lon, this.maxLon));
    if (dist2d(lat, lon, closeLat, closeLon) >= result.bestDist) return;

    for (const p of this.points) {
      const d = dist2d(lat, lon, p.lat, p.lon);
      if (d < result.bestDist) { result.bestDist = d; result.bestNode = p; }
    }
    if (this.divided) {
      this.nw._findNearest(lat, lon, result);
      this.ne._findNearest(lat, lon, result);
      this.sw._findNearest(lat, lon, result);
      this.se._findNearest(lat, lon, result);
    }
  }
}

function dist2d(lat1, lon1, lat2, lon2) {
  const dLat = lat1 - lat2, dLon = lon1 - lon2;
  return Math.sqrt(dLat * dLat + dLon * dLon);
}

// ══════════════════════════════════════════════════════════
//  ROUTING ALGORITHMS
// ══════════════════════════════════════════════════════════

function dijkstra(graph, srcId, destId, recordSteps = false) {
  const dist = new Map(), prev = new Map(), visited = new Set();
  const steps = []; // for animation
  for (const n of graph.getAllNodes()) dist.set(n.id, Infinity);
  dist.set(srcId, 0);

  // Simple priority queue (heap would be better for large graphs)
  const pq = [[0, srcId]];

  while (pq.length) {
    pq.sort((a, b) => a[0] - b[0]);
    const [d, uid] = pq.shift();
    if (visited.has(uid)) continue;
    visited.add(uid);
    if (recordSteps) steps.push({ type: 'visit', nodeId: uid });
    if (uid === destId) break;

    for (const edge of graph.getNeighbors(uid)) {
      const vid = edge.dest.id;
      if (visited.has(vid)) continue;
      const nd = dist.get(uid) + edge.distance;
      if (nd < dist.get(vid)) {
        dist.set(vid, nd);
        prev.set(vid, uid);
        pq.push([nd, vid]);
        if (recordSteps) steps.push({ type: 'explore', nodeId: vid });
      }
    }
  }
  return buildResult(graph, srcId, destId, dist, prev, 'distance', steps);
}

function aStar(graph, srcId, destId, recordSteps = false) {
  const dest = graph.getNode(destId);
  const gScore = new Map(), fScore = new Map(), prev = new Map(), visited = new Set();
  const steps = [];
  for (const n of graph.getAllNodes()) { gScore.set(n.id, Infinity); fScore.set(n.id, Infinity); }

  gScore.set(srcId, 0);
  fScore.set(srcId, heuristic(graph.getNode(srcId), dest));
  const open = [[fScore.get(srcId), srcId]];

  while (open.length) {
    open.sort((a, b) => a[0] - b[0]);
    const [, uid] = open.shift();
    if (visited.has(uid)) continue;
    visited.add(uid);
    if (recordSteps) steps.push({ type: 'visit', nodeId: uid });
    if (uid === destId) break;

    for (const edge of graph.getNeighbors(uid)) {
      const vid = edge.dest.id;
      if (visited.has(vid)) continue;
      const tg = gScore.get(uid) + edge.travelTime;
      if (tg < gScore.get(vid)) {
        prev.set(vid, uid);
        gScore.set(vid, tg);
        fScore.set(vid, tg + heuristic(edge.dest, dest));
        open.push([fScore.get(vid), vid]);
        if (recordSteps) steps.push({ type: 'explore', nodeId: vid });
      }
    }
  }
  return buildResult(graph, srcId, destId, gScore, prev, 'time', steps);
}

function heuristic(a, b) {
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLon = (b.lon - a.lon) * Math.PI / 180;
  const x = Math.sin(dLat / 2) ** 2 +
    Math.cos(a.lat * Math.PI / 180) * Math.cos(b.lat * Math.PI / 180) *
    Math.sin(dLon / 2) ** 2;
  return (R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x))) / 60; // dist/maxSpeed
}

function buildResult(graph, srcId, destId, costMap, prev, mode, steps) {
  if (costMap.get(destId) === Infinity) return null;

  const path = [];
  let cur = destId;
  while (cur !== undefined) { path.unshift(cur); cur = prev.get(cur); }

  let totalDist = 0, totalTime = 0;
  for (let i = 0; i < path.length - 1; i++) {
    for (const edge of graph.getNeighbors(path[i])) {
      if (edge.dest.id === path[i + 1]) {
        totalDist += edge.distance;
        totalTime += edge.travelTime;
        break;
      }
    }
  }
  return { path, totalDist, totalTime, steps };
}

// ══════════════════════════════════════════════════════════
//  GLOBAL STATE
// ══════════════════════════════════════════════════════════

let graph = new Graph();
let quadTree;
let strategy = 'dijkstra';
let selectedSrc = null, selectedDest = null;
let currentRoute = null;        // { path: string[] }
let exploredNodes = new Set();   // for animation
let animatingRoute = [];         // edges being animated
let hoveredNode = null;
let animationId = null;

// Canvas
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');

// ══════════════════════════════════════════════════════════
//  BUILD CAMPUS MAP
// ══════════════════════════════════════════════════════════

function buildCampusMap() {
  const locations = [
    ['MG',  'Main Gate',     12.9716, 77.5946],
    ['LIB', 'Library',       12.9730, 77.5960],
    ['SCI', 'Science Block', 12.9745, 77.5955],
    ['ENG', 'Engg Block',    12.9740, 77.5975],
    ['CAF', 'Cafeteria',     12.9725, 77.5980],
    ['HOS', 'Hostel',        12.9710, 77.5970],
    ['SPT', 'Sports Ground', 12.9700, 77.5950],
    ['AUD', 'Auditorium',    12.9735, 77.5940],
    ['ADM', 'Admin Block',   12.9750, 77.5970],
    ['PKG', 'Parking Lot',   12.9712, 77.5935],
  ];

  for (const [id, name, lat, lon] of locations) {
    graph.addNode(new GeoNode(id, name, lat, lon));
  }

  const roads = [
    ['MG','LIB',0.5,30], ['MG','PKG',0.3,20], ['MG','HOS',0.6,25],
    ['LIB','SCI',0.4,30], ['LIB','AUD',0.3,25], ['LIB','CAF',0.5,20],
    ['SCI','ENG',0.3,30], ['SCI','ADM',0.2,25],
    ['ENG','CAF',0.4,25], ['ENG','ADM',0.3,30],
    ['CAF','HOS',0.4,20], ['HOS','SPT',0.3,15],
    ['SPT','PKG',0.4,20], ['AUD','PKG',0.5,25],
  ];

  for (const [s, d, dist, spd] of roads) {
    graph.addEdge(graph.getNode(s), graph.getNode(d), dist, spd);
  }

  rebuildQuadTree();
}

function rebuildQuadTree() {
  const nodes = graph.getAllNodes();
  let minLat = Infinity, maxLat = -Infinity, minLon = Infinity, maxLon = -Infinity;
  for (const n of nodes) {
    minLat = Math.min(minLat, n.lat);  maxLat = Math.max(maxLat, n.lat);
    minLon = Math.min(minLon, n.lon);  maxLon = Math.max(maxLon, n.lon);
  }
  quadTree = new QuadTree(minLat - 0.01, maxLat + 0.01, minLon - 0.01, maxLon + 0.01);
  for (const n of nodes) quadTree.insert(n);
}

// ══════════════════════════════════════════════════════════
//  CANVAS RENDERING
// ══════════════════════════════════════════════════════════

function resizeCanvas() {
  const container = document.getElementById('canvas-container');
  canvas.width = container.clientWidth * devicePixelRatio;
  canvas.height = container.clientHeight * devicePixelRatio;
  canvas.style.width = container.clientWidth + 'px';
  canvas.style.height = container.clientHeight + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  computeNodePositions();
  render();
}

function computeNodePositions() {
  const nodes = graph.getAllNodes();
  if (!nodes.length) return;

  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  const pad = 80;

  let minLat = Infinity, maxLat = -Infinity, minLon = Infinity, maxLon = -Infinity;
  for (const n of nodes) {
    minLat = Math.min(minLat, n.lat); maxLat = Math.max(maxLat, n.lat);
    minLon = Math.min(minLon, n.lon); maxLon = Math.max(maxLon, n.lon);
  }

  const latRange = maxLat - minLat || 1;
  const lonRange = maxLon - minLon || 1;

  for (const n of nodes) {
    n.x = pad + ((n.lon - minLon) / lonRange) * (w - 2 * pad);
    n.y = pad + ((maxLat - n.lat) / latRange) * (h - 2 * pad); // flip y
  }
}

function render() {
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  // Draw edges
  const drawnEdges = new Set();
  for (const node of graph.getAllNodes()) {
    for (const edge of graph.getNeighbors(node.id)) {
      const key = [edge.src.id, edge.dest.id].sort().join('-');
      if (drawnEdges.has(key)) continue;
      drawnEdges.add(key);
      drawEdge(edge, false);
    }
  }

  // Draw explored nodes (animation)
  for (const nodeId of exploredNodes) {
    const n = graph.getNode(nodeId);
    if (!n) continue;
    ctx.beginPath();
    ctx.arc(n.x, n.y, 22, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(251, 191, 36, 0.12)';
    ctx.fill();
  }

  // Draw route
  if (currentRoute && currentRoute.path.length > 1) {
    drawRoutePath(currentRoute.path);
  }

  // Draw animated route segments
  if (animatingRoute.length > 0) {
    drawRoutePath(animatingRoute);
  }

  // Draw nodes
  for (const node of graph.getAllNodes()) {
    drawNode(node);
  }
}

function drawEdge(edge, isRoute) {
  ctx.beginPath();
  ctx.moveTo(edge.src.x, edge.src.y);
  ctx.lineTo(edge.dest.x, edge.dest.y);

  if (isRoute) {
    ctx.strokeStyle = '#10b981';
    ctx.lineWidth = 3.5;
    ctx.shadowColor = 'rgba(16, 185, 129, 0.6)';
    ctx.shadowBlur = 12;
  } else {
    ctx.strokeStyle = 'rgba(148, 163, 184, 0.2)';
    ctx.lineWidth = 1.5;
    ctx.shadowBlur = 0;
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  // edge label (distance)
  if (!isRoute) {
    const mx = (edge.src.x + edge.dest.x) / 2;
    const my = (edge.src.y + edge.dest.y) / 2;
    ctx.font = '10px Inter';
    ctx.fillStyle = 'rgba(148, 163, 184, 0.4)';
    ctx.textAlign = 'center';
    ctx.fillText(edge.distance + ' km', mx, my - 5);
  }
}

function drawRoutePath(pathIds) {
  if (pathIds.length < 2) return;
  ctx.beginPath();
  const first = graph.getNode(pathIds[0]);
  ctx.moveTo(first.x, first.y);

  for (let i = 1; i < pathIds.length; i++) {
    const n = graph.getNode(pathIds[i]);
    ctx.lineTo(n.x, n.y);
  }

  ctx.strokeStyle = '#10b981';
  ctx.lineWidth = 4;
  ctx.shadowColor = 'rgba(16, 185, 129, 0.6)';
  ctx.shadowBlur = 16;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Draw direction arrows
  for (let i = 0; i < pathIds.length - 1; i++) {
    const a = graph.getNode(pathIds[i]);
    const b = graph.getNode(pathIds[i + 1]);
    const mx = (a.x + b.x) / 2;
    const my = (a.y + b.y) / 2;
    const angle = Math.atan2(b.y - a.y, b.x - a.x);

    ctx.save();
    ctx.translate(mx, my);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(8, 0);
    ctx.lineTo(-4, -5);
    ctx.lineTo(-4, 5);
    ctx.closePath();
    ctx.fillStyle = '#10b981';
    ctx.fill();
    ctx.restore();
  }
}

function drawNode(node) {
  const isSource = selectedSrc === node.id;
  const isDest = selectedDest === node.id;
  const isHovered = hoveredNode === node.id;
  const isOnRoute = currentRoute && currentRoute.path.includes(node.id);
  const isExplored = exploredNodes.has(node.id);

  let radius = 8;
  let color = '#6366f1';
  let glowColor = 'rgba(99, 102, 241, 0.3)';
  let labelColor = '#e2e8f0';

  if (isSource) {
    color = '#f59e0b'; glowColor = 'rgba(245, 158, 11, 0.4)'; radius = 11;
  } else if (isDest) {
    color = '#ef4444'; glowColor = 'rgba(239, 68, 68, 0.4)'; radius = 11;
  } else if (isOnRoute) {
    color = '#10b981'; glowColor = 'rgba(16, 185, 129, 0.4)'; radius = 10;
  } else if (isHovered) {
    color = '#818cf8'; glowColor = 'rgba(129, 140, 248, 0.4)'; radius = 10;
  } else if (isExplored) {
    color = '#fbbf24'; glowColor = 'rgba(251, 191, 36, 0.3)'; radius = 9;
  }

  // Glow
  ctx.beginPath();
  ctx.arc(node.x, node.y, radius + 6, 0, Math.PI * 2);
  ctx.fillStyle = glowColor;
  ctx.fill();

  // Outer ring
  ctx.beginPath();
  ctx.arc(node.x, node.y, radius + 2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(10, 14, 26, 0.6)';
  ctx.fill();

  // Main circle
  ctx.beginPath();
  ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();

  // Inner highlight
  ctx.beginPath();
  ctx.arc(node.x - radius * 0.25, node.y - radius * 0.25, radius * 0.35, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255, 0.25)';
  ctx.fill();

  // Label
  ctx.font = '600 12px Inter';
  ctx.fillStyle = labelColor;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(node.name, node.x, node.y + radius + 8);

  // ID badge
  ctx.font = '500 9px Inter';
  ctx.fillStyle = 'rgba(148, 163, 184, 0.6)';
  ctx.fillText(node.id, node.x, node.y + radius + 22);
}

// ══════════════════════════════════════════════════════════
//  INTERACTIONS
// ══════════════════════════════════════════════════════════

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  let found = null;
  for (const n of graph.getAllNodes()) {
    if (Math.hypot(n.x - mx, n.y - my) < 18) { found = n; break; }
  }

  hoveredNode = found ? found.id : null;
  canvas.style.cursor = found ? 'pointer' : 'crosshair';

  const tooltip = document.getElementById('tooltip');
  if (found) {
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX - document.getElementById('sidebar').offsetWidth + 15) + 'px';
    tooltip.style.top = (e.clientY - 60) + 'px';
    tooltip.querySelector('.tt-name').textContent = found.name;
    tooltip.querySelector('.tt-id').textContent = found.id;
    tooltip.querySelector('.tt-coords').textContent = `${found.lat.toFixed(4)}, ${found.lon.toFixed(4)}`;
  } else {
    tooltip.style.display = 'none';
  }
  render();
});

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  let clickedNode = null;
  for (const n of graph.getAllNodes()) {
    if (Math.hypot(n.x - mx, n.y - my) < 18) { clickedNode = n; break; }
  }

  if (clickedNode) {
    // First click = source, second = dest
    if (!selectedSrc || (selectedSrc && selectedDest)) {
      selectedSrc = clickedNode.id;
      selectedDest = null;
      currentRoute = null;
      exploredNodes.clear();
      animatingRoute = [];
      document.getElementById('src-select').value = clickedNode.id;
      document.getElementById('dest-select').value = '';
      document.getElementById('route-result').style.display = 'none';
      notify('Source: ' + clickedNode.name, 'success');
    } else {
      selectedDest = clickedNode.id;
      document.getElementById('dest-select').value = clickedNode.id;
      notify('Destination: ' + clickedNode.name, 'success');
    }
  } else {
    // Click on empty space -> find nearest
    const containerW = canvas.width / devicePixelRatio;
    const containerH = canvas.height / devicePixelRatio;
    const nodes = graph.getAllNodes();
    if (!nodes.length) return;

    // Reverse map canvas coords to lat/lon
    let minLat = Infinity, maxLat = -Infinity, minLon = Infinity, maxLon = -Infinity;
    for (const n of nodes) {
      minLat = Math.min(minLat, n.lat); maxLat = Math.max(maxLat, n.lat);
      minLon = Math.min(minLon, n.lon); maxLon = Math.max(maxLon, n.lon);
    }
    const pad = 80;
    const lon = minLon + ((mx - pad) / (containerW - 2 * pad)) * (maxLon - minLon);
    const lat = maxLat - ((my - pad) / (containerH - 2 * pad)) * (maxLat - minLat);

    const nearest = quadTree.findNearest(lat, lon);
    if (nearest) {
      document.getElementById('nearest-result').textContent =
        `Nearest: ${nearest.name} (${nearest.id})`;
      // Open the nearest section
      const nearestPanel = document.querySelectorAll('.collapsible-header')[3];
      if (nearestPanel.classList.contains('collapsed')) {
        toggleCollapsible(nearestPanel);
      }
      notify('Nearest: ' + nearest.name, 'success');
    }
  }
  render();
});

// ══════════════════════════════════════════════════════════
//  UI ACTIONS
// ══════════════════════════════════════════════════════════

function setStrategy(s) {
  strategy = s;
  document.getElementById('btn-dijkstra').classList.toggle('active', s === 'dijkstra');
  document.getElementById('btn-astar').classList.toggle('active', s === 'astar');
  document.getElementById('stat-strategy').textContent = s === 'dijkstra' ? 'Dijkstra' : 'A*';
}

function findRoute() {
  const srcId = document.getElementById('src-select').value;
  const destId = document.getElementById('dest-select').value;

  if (!srcId || !destId) { notify('Select both source and destination', 'error'); return; }
  if (srcId === destId) { notify('Source and destination are the same', 'error'); return; }

  selectedSrc = srcId;
  selectedDest = destId;
  exploredNodes.clear();
  animatingRoute = [];

  const t0 = performance.now();
  const result = strategy === 'dijkstra'
    ? dijkstra(graph, srcId, destId)
    : aStar(graph, srcId, destId);
  const elapsed = performance.now() - t0;

  if (!result) { notify('No route found', 'error'); currentRoute = null; render(); return; }

  currentRoute = result;
  showRouteResult(result, elapsed);
  render();
}

function findRouteAnimated() {
  const srcId = document.getElementById('src-select').value;
  const destId = document.getElementById('dest-select').value;

  if (!srcId || !destId) { notify('Select both source and destination', 'error'); return; }
  if (srcId === destId) { notify('Source and destination are the same', 'error'); return; }

  selectedSrc = srcId;
  selectedDest = destId;
  currentRoute = null;
  exploredNodes.clear();
  animatingRoute = [];

  const t0 = performance.now();
  const result = strategy === 'dijkstra'
    ? dijkstra(graph, srcId, destId, true)
    : aStar(graph, srcId, destId, true);
  const elapsed = performance.now() - t0;

  if (!result) { notify('No route found', 'error'); render(); return; }

  // Animate exploration
  if (animationId) cancelAnimationFrame(animationId);
  let stepIdx = 0;
  const steps = result.steps;

  function animateStep() {
    if (stepIdx < steps.length) {
      const step = steps[stepIdx];
      exploredNodes.add(step.nodeId);
      stepIdx++;
      render();
      animationId = setTimeout(animateStep, 120);
    } else {
      // Now animate the route path
      currentRoute = result;
      let pathIdx = 1;
      animatingRoute = [result.path[0]];

      function animatePath() {
        if (pathIdx < result.path.length) {
          animatingRoute.push(result.path[pathIdx]);
          pathIdx++;
          render();
          animationId = setTimeout(animatePath, 200);
        } else {
          animatingRoute = [];
          showRouteResult(result, elapsed);
          render();
        }
      }
      animatePath();
    }
  }

  render();
  animateStep();
}

function showRouteResult(result, elapsed) {
  const pathNames = result.path.map(id => graph.getNode(id).name);
  document.getElementById('route-path').textContent = pathNames.join(' → ');
  document.getElementById('route-dist').textContent = result.totalDist.toFixed(2) + ' km';
  document.getElementById('route-time').textContent = (result.totalTime * 60).toFixed(1) + ' min';
  document.getElementById('route-ms').textContent = elapsed.toFixed(2) + ' ms';
  document.getElementById('route-result').style.display = 'block';
}

function addLocation() {
  const id = document.getElementById('add-id').value.trim().toUpperCase();
  const name = document.getElementById('add-name').value.trim();
  const lat = parseFloat(document.getElementById('add-lat').value);
  const lon = parseFloat(document.getElementById('add-lon').value);

  if (!id || !name || isNaN(lat) || isNaN(lon)) {
    notify('Fill all fields', 'error'); return;
  }
  if (graph.getNode(id)) { notify('ID already exists', 'error'); return; }

  graph.addNode(new GeoNode(id, name, lat, lon));
  rebuildQuadTree();
  refreshDropdowns();
  computeNodePositions();
  updateStats();

  // Clear form
  document.getElementById('add-id').value = '';
  document.getElementById('add-name').value = '';
  document.getElementById('add-lat').value = '';
  document.getElementById('add-lon').value = '';

  notify('Added: ' + name, 'success');
  render();
}

function addRoad() {
  const fromId = document.getElementById('road-from').value;
  const toId = document.getElementById('road-to').value;
  const dist = parseFloat(document.getElementById('road-dist').value);
  const speed = parseFloat(document.getElementById('road-speed').value);

  if (!fromId || !toId || isNaN(dist) || isNaN(speed)) {
    notify('Fill all fields', 'error'); return;
  }
  if (fromId === toId) { notify('Cannot connect a node to itself', 'error'); return; }

  graph.addEdge(graph.getNode(fromId), graph.getNode(toId), dist, speed);
  updateStats();

  document.getElementById('road-dist').value = '';
  document.getElementById('road-speed').value = '';

  notify(`Road added: ${fromId} ↔ ${toId}`, 'success');
  render();
}

// ══════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════

function refreshDropdowns() {
  const nodes = graph.getAllNodes();
  const selects = ['src-select', 'dest-select', 'road-from', 'road-to'];

  for (const selId of selects) {
    const sel = document.getElementById(selId);
    const currentVal = sel.value;
    sel.innerHTML = '<option value="">Select...</option>';
    for (const n of nodes) {
      const opt = document.createElement('option');
      opt.value = n.id;
      opt.textContent = `${n.name} (${n.id})`;
      sel.appendChild(opt);
    }
    sel.value = currentVal;
  }
}

function updateStats() {
  document.getElementById('stat-nodes').textContent = graph.nodeCount;
  document.getElementById('stat-edges').textContent = graph.edgeCount;
}

function toggleCollapsible(header) {
  header.classList.toggle('collapsed');
  header.nextElementSibling.classList.toggle('collapsed');
}

function notify(msg, type) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.className = type + ' show';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════

buildCampusMap();
resizeCanvas();
refreshDropdowns();
updateStats();

window.addEventListener('resize', resizeCanvas);
</script>
